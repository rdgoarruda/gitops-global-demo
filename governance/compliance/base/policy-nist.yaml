# NIST SP 800-190 — Application Container Security Guide
# Controles: AC-3, AC-6, CM-6, CM-7, SC-28, SI-3
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-compliance-nist-baseline
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    # ── NIST AC-6 / CM-7: sem hostPID (acesso ao espaço de processo do host) ─
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-nist-deny-host-pid
        spec:
          remediationAction: enforce
          severity: critical
          namespaceSelector:
            include: ["*"]
            exclude: ["kube-system", "open-cluster-management*", "haproxy-controller"]
          object-templates:
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: v1
                kind: Pod
                spec:
                  hostPID: true
    # ── NIST AC-6 / CM-7: sem hostIPC (acesso ao IPC do host) ─────────────
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-nist-deny-host-ipc
        spec:
          remediationAction: enforce
          severity: critical
          namespaceSelector:
            include: ["*"]
            exclude: ["kube-system", "open-cluster-management*", "haproxy-controller"]
          object-templates:
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: v1
                kind: Pod
                spec:
                  hostIPC: true
    # ── NIST SC-28 / CM-7: sem hostNetwork (expõe interfaces de rede do host) ─
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-nist-deny-host-network
        spec:
          remediationAction: enforce
          severity: critical
          namespaceSelector:
            include: ["*"]
            exclude: ["kube-system", "open-cluster-management*", "haproxy-controller"]
          object-templates:
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: v1
                kind: Pod
                spec:
                  hostNetwork: true
    # ── NIST CM-6 / SI-3: namespaces não devem permitir PSS privileged ───────
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-nist-deny-privileged-pss-namespace
        spec:
          remediationAction: enforce
          severity: high
          namespaceSelector:
            include: ["*"]
            exclude: ["kube-system", "open-cluster-management*", "haproxy-controller"]
          object-templates:
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  labels:
                    pod-security.kubernetes.io/enforce: privileged
