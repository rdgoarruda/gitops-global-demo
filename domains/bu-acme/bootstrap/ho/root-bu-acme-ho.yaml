apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-bu-acme-ho
  namespace: argocd
  labels:
    bu: bu-acme
    environment: ho
spec:
  project: default
  source:
    repoURL: 'https://github.com/rdgoarruda/gitops-global-demo.git'
    targetRevision: main
    path: domains/bu-acme/ho
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
