# ApplicationSet para deploy das tools do BU ACME em HO
# Matrix Generator: combina dirs do repo de workloads com clusters do OCM Placement
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: appset-tools-bu-acme-ho
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - git:
              repoURL: 'https://github.com/rdgoarruda/gitops-bu-acme-demo.git'
              revision: main
              directories:
                - path: ho/tools/*
          - clusterDecisionResource:
              configMapRef: acm-placement
              labelSelector:
                matchLabels:
                  cluster.open-cluster-management.io/placement: bu-acme-placement-ho
              requeueAfterSeconds: 180
  template:
    metadata:
      name: '{{path.basename}}-bu-acme-ho'
      labels:
        tool: '{{path.basename}}'
        bu: bu-acme
        environment: ho
    spec:
      project: default
      source:
        repoURL: 'https://github.com/rdgoarruda/gitops-bu-acme-demo.git'
        targetRevision: main
        path: '{{path}}'
      destination:
        name: '{{clusterName}}'
        namespace: bu-acme-workloads
      syncPolicy:
        automated: {prune: true, selfHeal: true}
        syncOptions: [CreateNamespace=true, ServerSideApply=true]
