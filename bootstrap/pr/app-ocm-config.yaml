apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocm-config-pr
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/sync-options: "Prune=false"
spec:
  project: default
  source:
    repoURL: 'https://github.com/rdgoarruda/gitops-global-demo.git'
    targetRevision: main
    path: config/pr
  destination:
    server: https://kubernetes.default.svc
    namespace: ocm-policies-pr
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
