apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-bootstrap-ho
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/SEU_USUARIO/gitops-global-demo.git'
    targetRevision: main
    path: bootstrap/ho
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: {prune: true, selfHeal: true}
